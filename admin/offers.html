<!DOCTYPE html>

<html>

<head>

<title>Manage Offers</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="container">


<h1>

Manage Offers

</h1>



<input

id="title"

placeholder="Offer Name"

>



<textarea

id="description"

placeholder="Description"

>

</textarea>



<input

id="reward"

placeholder="Reward (BDT)"

>



<input

id="link"

placeholder="CPA Link"

>



<input

id="category"

placeholder="Category"

>



<label>

Offer Image

</label>


<input

type="file"

id="image"

accept="image/*"

>



<br>



<button

onclick="addOffer()"

>

Add Offer

</button>



<hr>



<h2>

Offer List

</h2>



<div

id="offers"

>

</div>



</div>



<script src="script.js"></script>

</body>

  </html>
