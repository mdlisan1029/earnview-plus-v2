<!DOCTYPE html>

<html>

<head>

<title>

Withdraw

</title>

<link rel="stylesheet"

href="style.css">

</head>


<body>


<div class="container">


<h1>

Withdraw

</h1>



<input

id="amount"

type="number"

min="100"

placeholder="Minimum 100 BDT"

>



<select id="method">


<option value="bkash">

bKash (Fee 5 BDT)

</option>


<option value="nagad">

Nagad (Fee 5 BDT)

</option>


<option value="recharge">

Recharge (Free)

</option>



</select>



<input

id="number"

placeholder="Number"

>



<button onclick="createWithdraw()">

Submit

</button>



</div>



<script src="script.js"></script>


</body>


</html>
